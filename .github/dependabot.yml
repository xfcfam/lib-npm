# Dependabot configuration for the xfcfam/lib-npm monorepo.
#
# One npm entry covers the workspace root and every package via a
# directory glob (Dependabot updates the shared pnpm-lock.yaml). Updates
# are grouped to keep PR noise low:
#   - one PR for all minor + patch bumps (safe, merge freely once CI is green)
#   - one PR for all major bumps (review together; may carry breaking changes)
#   - one PR for GitHub Actions bumps
#
# Result: ~3 PRs per week instead of one-per-dependency-per-directory.

version: 2
updates:
  # ── npm: workspace root + every package ──────────────────────────
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/packages/*"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
      npm-major:
        update-types:
          - "major"

  # ── GitHub Actions ───────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
    groups:
      github-actions:
        update-types:
          - "major"
          - "minor"
          - "patch"
