name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs of the same workflow on the same ref. Saves
# CI minutes when a contributor pushes multiple commits in quick
# succession.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Test on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22.x', '24.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  # Architecture gate: every package must be well-formed (conformance level
  # Λ ≥ 3) per CFAM § 11.4, checked with the published @xfcfam/tools validator.
  # Make this a required status check in branch protection so a PR that drops
  # any package below Λ = 3 cannot be merged into `main`.
  conformance:
    name: Conformance (Λ ≥ 3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'pnpm'

      # No `pnpm install` needed: the gate pulls @xfcfam/tools on demand via
      # `pnpm dlx`, and the validator reads each package's source tree directly.
      - name: XF conformance gate (Λ ≥ 3)
        run: pnpm conformance
