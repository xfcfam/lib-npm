name: release

# Token-free release via the standard Changesets PR flow.
#
# On a push to `main` that carries pending changesets, the Changesets action
# opens (or updates) a "Version Packages" PR on a `changeset-release/main`
# branch — using the built-in GITHUB_TOKEN, no PAT. Merging that PR lands the
# version bumps + CHANGELOGs on `main` through the normal protected-branch PR
# flow, so NO branch-protection bypass and NO long-lived token are needed.
# The merge re-triggers this workflow, which now finds no pending changesets
# and runs `changeset publish`.
#
# npm auth is **trusted publishing (OIDC)** — NO npm token. The job's
# `id-token: write` + each package's Trusted Publisher config (org `xfcfam`,
# repo `lib-npm`, workflow `release.yml`, environment `release`) let npm verify
# this run. Provenance attestations are generated automatically.
#
# Required configuration:
#   - Settings → Actions → General → "Allow GitHub Actions to create and
#     approve pull requests" (so the action can open the Version PR).
#   - A GitHub Environment `release`, restricted to `main`.
#   - Per-package Trusted Publisher on npmjs.com (environment `release`).

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'pnpm'

      # Pre-publish conformance guard: refuse to release if any package is
      # below Λ = 3 (not well-formed) per CFAM § 11.4. Runs before install and
      # before the Changesets action, so a non-conformant tree aborts the run
      # instead of versioning or publishing to npm. Defence-in-depth alongside
      # the required CI check — release.yml fires on push to `main`, after merge.
      - name: XF conformance gate (Λ ≥ 3)
        run: pnpm conformance

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Upgrade npm for OIDC
        # Runners ship npm 10.x; trusted publishing needs npm >= 11.5.1.
        # `pnpm changeset publish` calls npm under the hood, so upgrade it.
        run: npm install -g npm@latest

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
