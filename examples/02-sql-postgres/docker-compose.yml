# Throwaway local Postgres for running the example. Data is wiped on
# `docker compose down -v` so feel free to break things and reset.

services:
  postgres:
    image: postgres:16
    container_name: xf-example-postgres
    environment:
      POSTGRES_USER: xf
      POSTGRES_PASSWORD: xf
      POSTGRES_DB: xfdemo
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U xf -d xfdemo']
      interval: 2s
      timeout: 2s
      retries: 15
